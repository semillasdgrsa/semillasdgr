name: Sync Google Drive Gallery

on:
  # Runs every night at 1:00 AM Costa Rica time (07:00 UTC)
  schedule:
    - cron: "0 7 * * *"

  # Manual trigger button in GitHub → Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-auth google-api-python-client

      - name: Sync Drive and regenerate gallery
        env:
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python sync_drive.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/galeria/ galeria.html
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit"
          else
            git commit -m "sync: update gallery from Google Drive [skip ci]"
            git push
          fi
