name: Sync Google Drive Gallery

on:
  # Runs every night at 1:00 AM Costa Rica time (07:00 UTC)
  schedule:
    - cron: "0 7 * * *"

  # Manual "Run workflow" button in GitHub → Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gdown
        run: pip install gdown

      - name: Sync Drive and regenerate gallery
        run: python sync_drive.py

      - name: Show downloaded files (debug)
        if: always()
        run: |
          echo "=== /tmp/drive_sync structure ==="
          find /tmp/drive_sync -type f 2>/dev/null || echo "(empty or not created)"
          echo "=== assets/galeria structure ==="
          find assets/galeria -type f | sort

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: lcastillo789987@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: lcastillo789987@gmail.com
          from: Semillas DGR <lcastillo789987@gmail.com>
          subject: "⚠️ Sync galería falló — Semillas DGR"
          body: |
            La sincronización automática de Google Drive falló.

            Fecha: ${{ github.run_started_at }}
            Ver detalles: https://github.com/semillasdgrsa/semillasdgr/actions/runs/${{ github.run_id }}

            Revisa el error y corre el workflow manualmente cuando esté listo.

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/galeria/ galeria.html
          if git diff --cached --quiet; then
            echo "No new photos — nothing to commit"
          else
            git commit -m "sync: update gallery from Google Drive [skip ci]"
            git push
          fi
